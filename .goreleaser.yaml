version: 2

project_name: task-tracker

before:
  hooks:
    - go mod verify
    - go test ./...

builds:
  - id: task-tracker
    main: ./cmd/task-tracker
    binary: task-tracker
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - ids:
      - task-tracker
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  prerelease: auto
